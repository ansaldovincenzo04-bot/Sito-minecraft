<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Faccia TOP (erba verde) -->
  <polygon points="32,4 60,20 32,36 4,20" fill="#5d9e3f"/>
  <!-- Dettagli erba top -->
  <polygon points="32,4 60,20 32,36 4,20" fill="none" stroke="#4a8030" stroke-width="0.5" opacity="0.5"/>
  <rect x="20" y="13" width="4" height="4" fill="#6ab548" transform="rotate(-30,22,15)"/>
  <rect x="36" y="10" width="3" height="3" fill="#6ab548" transform="rotate(-30,37,11)"/>
  <rect x="28" y="18" width="3" height="3" fill="#4a8030" transform="rotate(-30,29,19)"/>
  <rect x="44" y="16" width="3" height="3" fill="#6ab548" transform="rotate(-30,45,17)"/>

  <!-- Faccia SINISTRA (terra marrone scuro) -->
  <polygon points="4,20 32,36 32,60 4,44" fill="#7a4e2d"/>
  <!-- Strato erba sulla sinistra -->
  <polygon points="4,20 32,36 32,40 4,24" fill="#5d9e3f"/>
  <!-- Texture terra sinistra -->
  <line x1="10" y1="30" x2="16" y2="33" stroke="#6a3f22" stroke-width="1" opacity="0.6"/>
  <line x1="8"  y1="38" x2="14" y2="41" stroke="#6a3f22" stroke-width="1" opacity="0.6"/>
  <line x1="14" y1="44" x2="20" y2="47" stroke="#6a3f22" stroke-width="1" opacity="0.6"/>
  <line x1="18" y1="34" x2="26" y2="38" stroke="#8a5e3a" stroke-width="1" opacity="0.4"/>
  <line x1="20" y1="50" x2="28" y2="54" stroke="#6a3f22" stroke-width="1" opacity="0.5"/>

  <!-- Faccia DESTRA (terra marrone medio) -->
  <polygon points="32,36 60,20 60,44 32,60" fill="#9c6437"/>
  <!-- Strato erba sulla destra -->
  <polygon points="32,36 60,20 60,24 32,40" fill="#6ab548"/>
  <!-- Texture terra destra -->
  <line x1="38" y1="30" x2="44" y2="27" stroke="#8a5428" stroke-width="1" opacity="0.6"/>
  <line x1="42" y1="38" x2="50" y2="34" stroke="#8a5428" stroke-width="1" opacity="0.6"/>
  <line x1="48" y1="42" x2="56" y2="38" stroke="#b07840" stroke-width="1" opacity="0.4"/>
  <line x1="36" y1="46" x2="46" y2="41" stroke="#8a5428" stroke-width="1" opacity="0.5"/>
  <line x1="44" y1="50" x2="54" y2="45" stroke="#8a5428" stroke-width="1" opacity="0.5"/>

  <!-- Bordi isometrici -->
  <polygon points="32,4 60,20 32,36 4,20" fill="none" stroke="#2d5a1a" stroke-width="1.2"/>
  <polygon points="4,20 32,36 32,60 4,44" fill="none" stroke="#3a1f0a" stroke-width="1.2"/>
  <polygon points="32,36 60,20 60,44 32,60" fill="none" stroke="#4a2a10" stroke-width="1.2"/>
  <!-- Spigolo verticale centrale -->
  <line x1="32" y1="36" x2="32" y2="60" stroke="#2a1505" stroke-width="1.2"/>
</svg>
